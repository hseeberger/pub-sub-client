version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: build
      include: scope
    groups:
      cargo-patch:
        update-types:
          - patch
        patterns:
          - "*"
      cargo-minor:
        update-types:
          - minor
        patterns:
          - "*"
      cargo-major:
        update-types:
          - major
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ci
      include: scope
    groups:
      ci-patch:
        update-types:
          - patch
        patterns:
          - "*"
      ci-minor:
        update-types:
          - minor
        patterns:
          - "*"
      ci-major:
        update-types:
          - major
        patterns:
          - "*"
