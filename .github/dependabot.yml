version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    commit-message:
      prefix: build
      include: scope
    groups:
      cargo-patches:
        update-types:
          - patch
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    commit-message:
      prefix: ci
      include: scope
    groups:
      ci-patches:
        update-types:
          - patch
        patterns:
          - "*"
